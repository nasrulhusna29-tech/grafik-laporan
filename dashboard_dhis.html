<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHIS - Puskesmas Cilincing</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="loaderText">Sinkronisasi Basis Data...</div>
    </div>

    <nav class="dhis-nav">
        <div class="nav-brand">
            <div class="logo-badge">📊 DHIS</div>
            <div class="brand-name">Puskesmas Cilincing</div>
        </div>
        <a href="index.html" class="back-home"><i class="fas fa-home me-1"></i> Menu Utama</a>
    </nav>

    <div class="main-layout">
        <aside class="sidebar">
            <div class="menu-section">
                <label class="menu-label">Navigasi Utama</label>
                <ul class="side-menu">
                    <li><a href="#" class="active"><i class="fas fa-chart-bar me-2"></i> Data Kunjungan</a></li>
                    <li><a href="#"><i class="fas fa-table me-2"></i> 10 Besar Penyakit</a></li>
                </ul>
            </div>

            <div class="filter-card">
    <label class="menu-label text-blue">Filter Data</label>
    
    <div class="filter-group">
        <label>Tahun</label>
        <select id="tahun" onchange="applyFilters()">
            <option value="SEMUA">Semua Tahun (2023-2026)</option> <option value="2026" selected>2026</option>
            <option value="2025">2025</option>
            <option value="2024">2024</option>
            <option value="2023">2023</option>
        </select>
    </div>

    <div class="filter-group">
        <label>Bulan</label>
        <select id="bulan" onchange="applyFilters()">
            <option value="SEMUA">Semua Bulan (Jan-Des)</option> <option value="JAN">Januari</option>
            <option value="FEB">Februari</option>
            <option value="MAR">Maret</option>
            <option value="APR">April</option>
            <option value="MEI">Mei</option>
            <option value="JUN">Juni</option>
            <option value="JUL">Juli</option>
            <option value="AGS">Agustus</option>
            <option value="SEP">September</option>
            <option value="OKT">Oktober</option>
            <option value="NOV">November</option>
            <option value="DES">Desember</option>
        </select>
    </div>

    <div class="filter-group">
        <label>Layanan/Poli</label>
        <select id="filterPoli" onchange="applyFilters()">
            <option value="SEMUA">Semua Layanan/Poli</option>
            </select>
        </div>
    </div>

            <div class="sidebar-footer">
                <button class="btn-download" onclick="exportToExcel()">
                    <i class="fas fa-file-excel"></i> Unduh Laporan
                </button>
            </div>
        </aside>

        <main class="content">
            <div class="stats-grid">
                <div class="stat-card l-border">
                    <span class="label">LAKI-LAKI</span>
                    <div class="value" id="valL">0</div>
                </div>
                <div class="stat-card p-border">
                    <span class="label">PEREMPUAN</span>
                    <div class="value" id="valP">0</div>
                </div>
                <div class="stat-card total-border">
                    <span class="label">TOTAL KUNJUNGAN</span>
                    <div class="value text-blue" id="valT">0</div>
                </div>
            </div>

            <div class="charts-wrapper">
                <div class="card">
                    <div class="card-header">Distribusi Top 7 Layanan</div>
                    <div class="chart-box"><canvas id="barChart"></canvas></div>
                </div>
                <div class="card">
                    <div class="card-header">Tren Kunjungan Bulanan</div>
                    <div class="chart-box"><canvas id="lineChart"></canvas></div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">Tabel Rincian Layanan</div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>No</th>
                                <th>Nama Layanan/Poli</th>
                                <th>L</th>
                                <th>P</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
