<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Bulanan Puskesmas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; padding: 20px; text-align: center; }
        .container { background: white; max-width: 900px; margin: auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        select { padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; margin-bottom: 20px; width: 200px; }
        h2 { color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>Laporan Kunjungan Pasien Per Poli 2025</h2>
    
    <label for="bulan">Pilih Bulan: </label>
    <select id="bulan" onchange="loadData()">
        <option value="JAN">Januari</option>
        <option value="FEB">Februari</option>
        <option value="MAR">Maret</option>
        <option value="APR">April</option>
        <option value="MEI">Mei</option>
        <option value="JUN">Juni</option>
        <option value="JUL">Juli</option>
        <option value="AGS">Agustus</option>
        <option value="SEP">September</option>
        <option value="OKT">Oktober</option>
        <option value="NOV">November</option>
        <option value="DES">Desember</option>
    </select>

    <canvas id="myChart"></canvas>
</div>

<script>
    let chartInstance = null;

    async function loadData() {
        const sheetName = document.getElementById('bulan').value;
        const spreadsheetId = '1PogbrbJAnjpP7NqogqrQbu8WkKs1g62l';
        
        // PERBAIKAN: Gunakan format gviz/tq untuk mengambil CSV berdasarkan nama sheet
        const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;

        try {
            const response = await fetch(url);
            const csvText = await response.text();
            
            // Proses CSV ke Array (Menggunakan regex agar koma di dalam tanda kutip tidak ikut terpecah)
            const rows = csvText.split('\n').map(row => row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g));
            
            const labels = [];
            const dataJumlah = [];

            // Baris data mulai dari baris ke-12 (index 11)
            for (let i = 11; i < rows.length; i++) {
                if (!rows[i]) continue;
                
                let namaPoli = rows[i][1]?.replace(/"/g, "").trim(); 
                let jumlah = rows[i][4]?.replace(/"/g, "").trim();

                // Validasi agar hanya mengambil baris yang benar-benar berisi data poli
                if (namaPoli && !isNaN(jumlah) && namaPoli !== "" && namaPoli !== "NAMA RUANGAN / POLI") {
                    labels.push(namaPoli);
                    dataJumlah.push(parseInt(jumlah));
                }
            }

            renderChart(labels, dataJumlah, sheetName);
        } catch (error) {
            console.error("Gagal memuat data:", error);
            alert("Gagal memuat data. Pastikan Google Sheet sudah di-share ke 'Anyone with the link'!");
        }
    }

    function renderChart(labels, data, bulan) {
        const ctx = document.getElementById('myChart').getContext('2d');

        if (chartInstance) {
            chartInstance.destroy();
        }

        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels.slice(0, 15), // Menampilkan 15 poli pertama agar tidak terlalu sempit
                datasets: [{
                    label: `Total Kunjungan Pasien - ${bulan} 2025`,
                    data: data.slice(0, 15),
                    backgroundColor: 'rgba(52, 152, 219, 0.7)',
                    borderColor: 'rgba(41, 128, 185, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                indexAxis: 'y', // Mengubah menjadi bar horizontal agar nama Poli lebih mudah dibaca
                scales: {
                    x: { beginAtZero: true }
                },
                plugins: {
                    legend: { position: 'top' }
                }
            }
        });
    }

    loadData();
</script>

</body>
</html>
