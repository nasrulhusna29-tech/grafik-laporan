<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kunjungan 2023-2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background-color: #f4f7f6; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        canvas { width: 100% !important; height: 400px !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>Grafik Kunjungan Bulanan (2023 - 2026)</h2>
    <canvas id="myChart"></canvas>
    <p style="font-size: 12px; color: #666; text-align: center; margin-top: 20px;">
        *Data diperbarui otomatis dari Google Sheets
    </p>
</div>

<script>
    // GANTI LINK DI BAWAH INI DENGAN LINK CSV DARI GOOGLE SHEETS ANDA
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1v...link-anda.../pub?output=csv';

    async function fetchData() {
        const response = await fetch(CSV_URL);
        const data = await response.text();
        
        // Sederhanakan: Di sini kita asumsikan data sudah siap di Sheet.
        // Jika Anda ingin input manual di kode saja (lebih aman/cepat), gunakan data di bawah:
        renderChart();
    }

    function renderChart() {
        const ctx = document.getElementById('myChart').getContext('2d');
        const labels = ['JAN', 'FEB', 'MAR', 'APR', 'MEI', 'JUN', 'JUL', 'AGU', 'SEP', 'OKT', 'NOV', 'DES'];

        const myChart = new Chart(ctx, {
            type: 'line', // Bisa diganti 'bar' jika suka grafik batang
            data: {
                labels: labels,
                datasets: [
                    {
                        label: '2023',
                        data: [120, 150, 180, 170, 200, 210, 250, 230, 220, 240, 260, 280], // Isi data Anda
                        borderColor: '#3498db',
                        backgroundColor: '#3498db',
                        tension: 0.3,
                        fill: false
                    },
                    {
                        label: '2024',
                        data: [130, 160, 190, 180, 210, 220, 260, 240, 230, 250, 270, 290],
                        borderColor: '#e74c3c',
                        backgroundColor: '#e74c3c',
                        tension: 0.3,
                        fill: false
                    },
                    {
                        label: '2025',
                        data: [140, 170, 200, 190, 220, 230, 270, 250, 240, 260, 280, 300],
                        borderColor: '#2ecc71',
                        backgroundColor: '#2ecc71',
                        tension: 0.3,
                        fill: false
                    },
                    {
                        label: '2026',
                        data: [160, 185], // Data berjalan (Jan-Feb 2026)
                        borderColor: '#f1c40f',
                        backgroundColor: '#f1c40f',
                        tension: 0.3,
                        fill: false
                    }
                ]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'top' }
                },
                scales: {
                    y: { beginAtZero: true, grid: { color: '#eee' } },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    renderChart();
</script>

</body>
</html>
