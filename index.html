<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kunjungan Poli Puskesmas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: #2c3e50; margin-bottom: 5px; }
        p { color: #7f8c8d; margin-bottom: 25px; }
        .controls { margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        select { padding: 10px 15px; font-size: 16px; border-radius: 8px; border: 1px solid #ddd; outline: none; cursor: pointer; }
        canvas { margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Grafik Kunjungan Pasien Per Poli 2025</h2>
    <p>Data real-time dari Google Spreadsheet</p>
    
    <div class="controls">
        <label for="bulan">Pilih Bulan: </label>
        <select id="bulan" onchange="loadData()">
            <option value="JAN">Januari</option>
            <option value="FEB">Februari</option>
            <option value="MAR">Maret</option>
            <option value="APR">April</option>
            <option value="MEI">Mei</option>
            <option value="JUN">Juni</option>
            <option value="JUL">Juli</option>
            <option value="AGS">Agustus</option>
            <option value="SEP">September</option>
            <option value="OKT">Oktober</option>
            <option value="NOV">November</option>
            <option value="DES">Desember</option>
        </select>
    </div>

    <canvas id="chartPoli"></canvas>
</div>

<script>
    let chartInstance = null;

    async function loadData() {
        const sheetName = document.getElementById('bulan').value;
        const spreadsheetId = '1PogbrbJAnjpP7NqogqrQbu8WkKs1g62l';
        
        // Link CSV khusus untuk mengambil sheet tertentu
        const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;

        try {
            const response = await fetch(url);
            const csvText = await response.text();
            
            // Memproses CSV: Mengatasi koma di dalam tanda kutip (nama poli yang panjang)
            const rows = csvText.split('\n').map(row => {
                const matches = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                return matches ? matches.map(m => m.replace(/"/g, "")) : [];
            });

            const labels = [];
            const dataValues = [];

            // Berdasarkan struktur file Anda:
            // Data mulai di baris 13 (indeks 12), Kolom Nama Poli di indeks 1, Kolom JUMLAH di indeks 4
            for (let i = 12; i < rows.length; i++) {
                const row = rows[i];
                if (row && row[1] && row[4]) {
                    const namaPoli = row[1].trim();
                    const jumlah = parseInt(row[4]);

                    // Pastikan bukan baris total atau kosong
                    if (namaPoli !== "" && !isNaN(jumlah)) {
                        labels.push(namaPoli);
                        dataValues.push(jumlah);
                    }
                }
            }

            renderChart(labels, dataValues, sheetName);
        } catch (error) {
            console.error("Gagal memuat data:", error);
            alert("Terjadi kesalahan saat mengambil data. Pastikan spreadsheet sudah di-Share ke 'Anyone with the link'!");
        }
    }

    function renderChart(labels, data, bulan) {
        const ctx = document.getElementById('chartPoli').getContext('2d');

        if (chartInstance) {
            chartInstance.destroy();
        }

        chartInstance = new Chart(ctx, {
            type: 'bar', // Anda bisa ganti ke 'line'
            data: {
                labels: labels.slice(0, 15), // Menampilkan 15 poli pertama agar tidak tumpang tindih
                datasets: [{
                    label: `Jumlah Kunjungan Pasien (${bulan})`,
                    data: data.slice(0, 15),
                    backgroundColor: 'rgba(52, 152, 219, 0.7)',
                    borderColor: 'rgba(41, 128, 185, 1)',
                    borderWidth: 1,
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                indexAxis: 'y', // Menggunakan grafik horizontal karena nama poli panjang
                plugins: {
                    legend: { position: 'top' }
                },
                scales: {
                    x: { beginAtZero: true }
                }
            }
        });
    }

    // Inisialisasi awal
    loadData();
</script>

</body>
</html>
