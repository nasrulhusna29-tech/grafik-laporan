<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puskesmas Cilincing 2026</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --bg-light: #f8fafc;
            --sidebar: #1e293b;
            --accent: #26ccca;
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { margin: 0; background-color: var(--bg-light); color: #1e293b; display: flex; flex-direction: column; min-height: 100vh; }

        /* Navbar */
        nav {
            background: var(--accent);
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-badge { background: var(--primary); color: white; padding: 5px 10px; border-radius: 8px; font-weight: 800; }
        .logo-text { font-weight: 700; font-size: 1.2rem; letter-spacing: -0.5px; color: white; }

        .main-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: calc(100vh - 60px);
        }

        /* Sidebar */
        .sidebar {
            background: white;
            border-right: 1px solid #e2e8f0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .filter-section {
            background: var(--bg-light);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .filter-group label { font-size: 0.75rem; font-weight: 700; color: var(--secondary); text-transform: uppercase; margin-bottom: 5px; display: block; }
        select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background: white;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }
        select:focus { border-color: var(--primary); }

        /* Stats & Cards */
        .content { padding: 2rem; overflow-y: auto; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            border-left: 4px solid var(--primary);
        }
        .stat-card.pink { border-left-color: #ec4899; }
        .stat-card.green { border-left-color: var(--success); }
        .stat-label { font-size: 0.875rem; color: var(--secondary); font-weight: 500; }
        .stat-value { font-size: 1.5rem; font-weight: 700; margin-top: 5px; }

        .charts-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 2rem;
        }
        .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: var(--card-shadow); }
        .card-header { font-weight: 700; margin-bottom: 1.5rem; color: #334155; display: flex; justify-content: space-between; }

        /* Table */
        .table-area { background: white; border-radius: 12px; box-shadow: var(--card-shadow); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        thead { background: #f8fafc; }
        th { padding: 12px 20px; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--secondary); border-bottom: 1px solid #e2e8f0; }
        td { padding: 14px 20px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        tr:hover { background: #f8fafc; }
        .badge-total { background: #dbeafe; color: #1e40af; padding: 4px 8px; border-radius: 6px; font-weight: 700; }

        /* Buttons */
        .btn-group { display: flex; gap: 10px; margin-top: auto; }
        .btn {
            flex: 1; padding: 12px; border: none; border-radius: 8px;
            font-weight: 600; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-excel { background: #10b981; color: white; }
        .btn-print { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }

        /* Loading Spinner */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); display: none;
            justify-content: center; align-items: center; z-index: 1000;
            flex-direction: column; gap: 15px;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 1024px) {
            .main-container { grid-template-columns: 1fr; }
            .charts-wrapper { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div id="loaderText" style="font-weight: 600; color: var(--sidebar);">Sinkronisasi Data...</div>
</div>

<nav>
    <div class="logo-area">
        <div class="logo-badge">P</div>
        <div class="logo-text">Puskesmas Cilincing <span style="font-weight: 300; opacity: 0.8;">Dashboard 2026</span></div>
    </div>
    <div id="currentInfo" style="font-size: 0.85rem; font-weight: 600; color: white;">DATA PUSKESMAS CILINCING</div>
</nav>

<div class="main-container">
    <aside class="sidebar">
        <div class="filter-section">
            <div class="filter-group">
                <label>Periode Tahun</label>
                <select id="tahun" onchange="applyFilters()">
                    <option value="SEMUA">Semua Tahun (2023-2026)</option>
                    <option value="2026" selected>Tahun 2026</option>
                    <option value="2025">Tahun 2025</option>
                    <option value="2024">Tahun 2024</option>
                    <option value="2023">Tahun 2023</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Bulan Operasional</label>
                <select id="bulan" onchange="applyFilters()">
                    <option value="SEMUA">Akumulasi Setahun</option>
                    <option value="JAN">Januari</option><option value="FEB">Februari</option>
                    <option value="MAR">Maret</option><option value="APR">April</option>
                    <option value="MEI">Mei</option><option value="JUN">Juni</option>
                    <option value="JUL">Juli</option><option value="AGS">Agustus</option>
                    <option value="SEP">September</option><option value="OKT">Oktober</option>
                    <option value="NOV">November</option><option value="DES">Desember</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Fokus Unit / Poli</label>
                <select id="filterPoli" onchange="applyFilters()">
                    <option value="SEMUA">Semua Layanan</option>
                </select>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-print" onclick="window.print()">Cetak</button>
            <button class="btn btn-excel" onclick="exportToExcel()">Excel</button>
        </div>
    </aside>

    <main class="content">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Kunjungan Laki-laki</div>
                <div class="stat-value" id="valL">0</div>
            </div>
            <div class="stat-card pink">
                <div class="stat-label">Kunjungan Perempuan</div>
                <div class="stat-value" id="valP">0</div>
            </div>
            <div class="stat-card green">
                <div class="stat-label">Total Pasien</div>
                <div class="stat-value" id="valT">0</div>
            </div>
        </div>

        <div class="charts-wrapper">
            <div class="card">
                <div class="card-header">Distribusi Jenis Kelamin (Top 7)</div>
                <div style="height: 280px;"><canvas id="barChart"></canvas></div>
            </div>
            <div class="card">
                <div class="card-header">Tren Bulanan</div>
                <div style="height: 280px;"><canvas id="lineChart"></canvas></div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                Detail Layanan Per Unit
                <span id="tableTitle" style="font-size: 0.8rem; color: var(--secondary);">Memuat data...</span>
            </div>
            <div class="table-area">
                <table id="mainTable">
                    <thead>
                        <tr>
                            <th width="50">No</th>
                            <th>Nama Ruangan / Poli</th>
                            <th width="120">Laki-laki</th>
                            <th width="120">Perempuan</th>
                            <th width="120">Total</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    let barChart = null, lineChart = null;
    let cachedData = {}; 
    const spreadsheetId = '1PogbrbJAnjpP7NqogqrQbu8WkKs1g62l';
    const listBulan = ['JAN', 'FEB', 'MAR', 'APR', 'MEI', 'JUN', 'JUL', 'AGS', 'SEP', 'OKT', 'NOV', 'DES'];
    const listTahun = ['2023', '2024', '2025', '2026'];

    async function initLoad() {
        const loader = document.getElementById('loader');
        loader.style.display = 'flex';
        
        try {
            for (let b of listBulan) {
                document.getElementById('loaderText').innerText = `Sinkronisasi Bulan ${b}...`;
                cachedData[b] = await fetchAllTahunFromSheet(b);
            }
            updatePoliDropdown();
            applyFilters();
        } catch (e) {
            alert("Gagal memuat data dari Spreadsheet. Pastikan koneksi internet stabil.");
        } finally {
            loader.style.display = 'none';
        }
    }

    async function fetchAllTahunFromSheet(sheetName) {
        const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;
        try {
            const res = await fetch(url);
            const text = await res.text();
            const rows = text.split('\n').map(r => r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/).map(c => c.replace(/"/g, '')));
            
            let dataMapping = {};
            // Dimulai dari baris 14 (index 13)
            for (let i = 13; i < rows.length; i++) {
                const r = rows[i];
                if (r && r[1] && !r[1].includes("TOTAL") && r[1].trim() !== "") {
                    const poli = r[1].trim();
                    dataMapping[poli] = {
                        "2023": { l: parseInt(r[2])||0, p: parseInt(r[3])||0, t: parseInt(r[4])||0 },
                        "2024": { l: parseInt(r[5])||0, p: parseInt(r[6])||0, t: parseInt(r[7])||0 },
                        "2025": { l: parseInt(r[8])||0, p: parseInt(r[9])||0, t: parseInt(r[10])||0 },
                        "2026": { l: parseInt(r[11])||0, p: parseInt(r[12])||0, t: parseInt(r[13])||0 } // Kolom L, M, N
                    };
                }
            }
            return dataMapping;
        } catch (e) { return {}; }
    }

    function updatePoliDropdown() {
        const poliSelect = document.getElementById('filterPoli');
        let allPoli = new Set();
        Object.values(cachedData).forEach(bulan => Object.keys(bulan).forEach(p => allPoli.add(p)));
        
        poliSelect.innerHTML = '<option value="SEMUA">Semua Layanan</option>';
        [...allPoli].sort().forEach(p => {
            const opt = document.createElement('option');
            opt.value = p; opt.innerText = p;
            poliSelect.appendChild(opt);
        });
    }

    function applyFilters() {
        const selThn = document.getElementById('tahun').value;
        const selBln = document.getElementById('bulan').value;
        const selPoli = document.getElementById('filterPoli').value;

        let tableData = [];
        let grandL = 0, grandP = 0, grandT = 0;

        // Ambil daftar poli unik
        let allPoliKeys = new Set();
        Object.values(cachedData).forEach(db => Object.keys(db).forEach(k => allPoliKeys.add(k)));
        let poliList = (selPoli === "SEMUA") ? Array.from(allPoliKeys) : [selPoli];

        poliList.forEach(namaPoli => {
            let sumL = 0, sumP = 0, sumT = 0;
            const targetBulan = (selBln === "SEMUA") ? listBulan : [selBln];
            const targetTahun = (selThn === "SEMUA") ? listTahun : [selThn];

            targetBulan.forEach(b => {
                targetTahun.forEach(t => {
                    if (cachedData[b] && cachedData[b][namaPoli]) {
                        sumL += cachedData[b][namaPoli][t].l;
                        sumP += cachedData[b][namaPoli][t].p;
                        sumT += cachedData[b][namaPoli][t].t;
                    }
                });
            });

            if (sumT > 0) {
                tableData.push({ nama: namaPoli, laki: sumL, peremp: sumP, total: sumT });
                grandL += sumL; grandP += sumP; grandT += sumT;
            }
        });

        document.getElementById('valL').innerText = grandL.toLocaleString();
        document.getElementById('valP').innerText = grandP.toLocaleString();
        document.getElementById('valT').innerText = grandT.toLocaleString();

        // Data untuk Grafik Tren Bulanan
        let lineValues = listBulan.map(b => {
            let val = 0;
            const targetTahun = (selThn === "SEMUA") ? listTahun : [selThn];
            const activePoli = (selPoli === "SEMUA") ? Array.from(allPoliKeys) : [selPoli];
            activePoli.forEach(p => {
                targetTahun.forEach(t => {
                    if (cachedData[b] && cachedData[b][p]) val += cachedData[b][p][t].t;
                });
            });
            return val;
        });

        renderUI(tableData, lineValues);
    }

    function renderUI(tableData, lineData) {
        tableData.sort((a,b) => b.total - a.total);
        document.getElementById('tableTitle').innerText = `Menampilkan ${tableData.length} Unit Layanan`;
        
        document.getElementById('tableBody').innerHTML = tableData.map((d, i) => `
            <tr>
                <td>${i+1}</td>
                <td style="font-weight:600;">${d.nama}</td>
                <td>${d.laki.toLocaleString()}</td>
                <td>${d.peremp.toLocaleString()}</td>
                <td><span class="badge-total">${d.total.toLocaleString()}</span></td>
            </tr>
        `).join('');

        const ctxBar = document.getElementById('barChart').getContext('2d');
        if (barChart) barChart.destroy();
        const top = tableData.slice(0, 7);
        barChart = new Chart(ctxBar, {
            type: 'bar',
            data: {
                labels: top.map(d=>d.nama),
                datasets: [
                    { label: 'Laki-laki', data: top.map(d=>d.laki), backgroundColor: '#3b82f6', borderRadius: 5 },
                    { label: 'Perempuan', data: top.map(d=>d.peremp), backgroundColor: '#ec4899', borderRadius: 5 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        });

        const ctxLine = document.getElementById('lineChart').getContext('2d');
        if (lineChart) lineChart.destroy();
        lineChart = new Chart(ctxLine, {
            type: 'line',
            data: {
                labels: listBulan,
                datasets: [{
                    label: 'Kunjungan',
                    data: lineData,
                    borderColor: '#2563eb',
                    backgroundColor: 'rgba(37, 99, 235, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    function exportToExcel() {
        const ws = XLSX.utils.table_to_sheet(document.getElementById('mainTable'));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Laporan 2026");
        XLSX.writeFile(wb, `Rekap_Puskesmas_Cilincing_2026.xlsx`);
    }

    initLoad();
</script>
</body>
</html>
