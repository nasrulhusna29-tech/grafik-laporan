<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Puskesmas Cilincing - Multi Tahun</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #007bff; --dark: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); padding-bottom: 15px; margin-bottom: 25px; }
        .filters { display: flex; gap: 15px; background: #e9ecef; padding: 15px; border-radius: 10px; margin-bottom: 25px; }
        .chart-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart-container { height: 350px; background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: var(--dark); color: white; padding: 12px; position: sticky; top: 0; }
        td { padding: 8px; border-bottom: 1px solid #eee; text-align: center; }
        .text-left { text-align: left; padding-left: 20px; font-weight: bold; }
        #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.2); display: none; z-index: 100; }
    </style>
</head>
<body>

<div id="loader">🔄 Menghubungkan ke Database...</div>

<div class="container">
    <div class="header">
        <h1>Dashboard Monitoring Puskesmas</h1>
        <div id="status" style="font-weight: bold; color: var(--primary);"></div>
    </div>

    <div class="filters">
        <div style="flex:1">
            <label>Pilih Tahun:</label>
            <select id="tahun" onchange="initLoad()" style="width:100%; padding:8px;">
                <option value="2025">2025</option>
                <option value="2024">2024</option>
                <option value="2023">2023</option>
            </select>
        </div>
        <div style="flex:1">
            <label>Pilih Bulan:</label>
            <select id="bulan" onchange="initLoad()" style="width:100%; padding:8px;">
                <option value="JAN">Januari</option><option value="FEB">Februari</option>
                <option value="MAR">Maret</option><option value="APR">April</option>
                <option value="MEI">Mei</option><option value="JUN">Juni</option>
                <option value="JUL">Juli</option><option value="AGS">Agustus</option>
                <option value="SEP">September</option><option value="OKT">Oktober</option>
                <option value="NOV">November</option><option value="DES">Desember</option>
            </select>
        </div>
    </div>

    <div class="chart-section">
        <div class="chart-container"><canvas id="barChart"></canvas></div>
        <div class="chart-container"><canvas id="lineChart"></canvas></div>
    </div>

    <div style="max-height: 400px; overflow-y: auto; border: 1px solid #ddd;">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th class="text-left">Unit Pelayanan</th>
                    <th>Laki-laki</th>
                    <th>Perempuan</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let barChart = null;
    let lineChart = null;
    const spreadsheetId = '1PogbrbJAnjpP7NqogqrQbu8WkKs1g62l';
    const listBulan = ['JAN', 'FEB', 'MAR', 'APR', 'MEI', 'JUN', 'JUL', 'AGS', 'SEP', 'OKT', 'NOV', 'DES'];

    async function initLoad() {
        const loader = document.getElementById('loader');
        const thn = document.getElementById('tahun').value;
        const bln = document.getElementById('bulan').value;

        loader.style.display = 'block';
        
        // 1. Ambil Data Detail untuk Bulan & Tahun terpilih (Contoh Sheet: "JAN 2023")
        // Jika nama sheet Anda hanya "JAN", "FEB" tanpa tahun, hapus ` + " " + thn` di bawah
        const sheetName = bln; 
        const detailData = await fetchCSV(sheetName);
        
        // 2. Ambil Tren Tahunan (Looping 12 bulan di tahun yang sama)
        let monthlyTotals = [];
        for (let b of listBulan) {
            const data = await fetchCSV(b);
            const sum = data.reduce((s, i) => s + i.total, 0);
            monthlyTotals.push(sum);
        }

        loader.style.display = 'none';
        renderUI(detailData, thn, bln, monthlyTotals);
    }

    async function fetchCSV(sheet) {
        // PERHATIKAN: Jika nama tab di spreadsheet Anda adalah "JAN 2023", gunakan: sheet + "%20" + document.getElementById('tahun').value
        // Jika nama tab hanya "JAN", "FEB" (bercampur tahun), script akan mengambil tab tersebut.
        const thn = document.getElementById('tahun').value;
        const fullSheetName = sheet; // Sesuaikan jika tab Anda bernama "JAN 2023" menjadi: `${sheet} ${thn}`
        
        const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:csv&sheet=${fullSheetName}`;
        
        try {
            const res = await fetch(url);
            const text = await res.text();
            const rows = text.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '')));
            
            let data = [];
            // Mulai baris ke-12 (index 11/12)
            for (let i = 12; i < rows.length; i++) {
                if (rows[i][1] && !rows[i][1].includes("TOTAL") && rows[i][1] !== "NAMA RUANGAN / POLI") {
                    data.push({
                        nama: rows[i][1].trim(),
                        laki: parseInt(rows[i][2]) || 0,
                        peremp: parseInt(rows[i][3]) || 0,
                        total: parseInt(rows[i][4]) || 0
                    });
                }
            }
            return data;
        } catch (e) { return []; }
    }

    function renderUI(data, thn, bln, monthlyTotals) {
        // Bar Chart
        const ctxBar = document.getElementById('barChart').getContext('2d');
        if (barChart) barChart.destroy();
        const topData = [...data].sort((a,b) => b.total - a.total).slice(0, 10);
        
        barChart = new Chart(ctxBar, {
            type: 'bar',
            data: {
                labels: topData.map(d => d.nama),
                datasets: [
                    { label: 'Laki-laki', data: topData.map(d => d.laki), backgroundColor: '#3498db' },
                    { label: 'Perempuan', data: topData.map(d => d.peremp), backgroundColor: '#e74c3c' }
                ]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                plugins: { title: { display: true, text: `Top 10 Unit (${bln} ${thn})` } }
            }
        });

        // Line Chart
        const ctxLine = document.getElementById('lineChart').getContext('2d');
        if (lineChart) lineChart.destroy();
        lineChart = new Chart(ctxLine, {
            type: 'line',
            data: {
                labels: listBulan,
                datasets: [{
                    label: `Tren Total Kunjungan ${thn}`,
                    data: monthlyTotals,
                    borderColor: '#2ecc71',
                    tension: 0.3,
                    fill: true,
                    backgroundColor: 'rgba(46, 204, 113, 0.1)'
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // Tabel
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = data.map((d, i) => `
            <tr>
                <td>${i+1}</td>
                <td class="text-left">${d.nama}</td>
                <td>${d.laki.toLocaleString()}</td>
                <td>${d.peremp.toLocaleString()}</td>
                <td style="font-weight:bold; color:var(--primary)">${d.total.toLocaleString()}</td>
            </tr>
        `).join('');
    }

    initLoad();
</script>
</body>
</html>
