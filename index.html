<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tren Kunjungan - Puskesmas Cilincing</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #007bff; --dark: #2c3e50; --success: #28a745; }
        body { font-family: 'Arial Narrow', sans-serif; background: #f4f4f4; margin: 0; padding: 5px; font-size: 11px; }
        header { background: white; border-bottom: 2px solid var(--primary); padding: 5px 15px; display: flex; justify-content: space-between; }
        .main-content { max-width: 1000px; margin: auto; padding: 10px; }
        .dashboard-card { background: white; padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .controls { display: flex; gap: 8px; margin-bottom: 10px; background: #eee; padding: 5px; border-radius: 4px; align-items: center; }
        select, button { padding: 2px 5px; font-size: 10px; border: 1px solid #ccc; border-radius: 3px; }
        .btn-excel { background: var(--success); color: white; border: none; cursor: pointer; }
        .chart-container { height: 250px; margin-bottom: 15px; }
        .table-wrapper { max-height: 300px; overflow-y: auto; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; line-height: 1; }
        thead th { background: #f0f0f0; padding: 4px; border: 1px solid #ddd; position: sticky; top: 0; }
        tbody td { padding: 3px; border: 1px solid #eee; text-align: center; }
        .text-left { text-align: left; }
        tfoot tr { background: var(--dark); color: white; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1 style="font-size: 14px; margin:0;">Tren Kunjungan Pasien 2025</h1>
    <div id="status" style="color:var(--primary); font-weight:bold;">Memuat Tren...</div>
</header>

<div class="main-content">
    <div class="dashboard-card">
        <div class="controls">
            <strong>Mode Lihat:</strong>
            <select id="viewMode" onchange="processDisplay()">
                <option value="TREN_TOTAL">Tren Total Puskesmas (Jan-Des)</option>
                <option value="PER_POLI">Detail Per Poli (Bulan Terpilih)</option>
            </select>

            <select id="bulan" onchange="processDisplay()">
                <option value="TOTAL">Tahunan</option>
                <option value="JAN">Januari</option><option value="FEB">Februari</option>
                <option value="MAR">Maret</option><option value="APR">April</option>
                <option value="MEI">Mei</option><option value="JUN">Juni</option>
                <option value="JUL">Juli</option><option value="AGS">Agustus</option>
                <option value="SEP">September</option><option value="OKT">Oktober</option>
                <option value="NOV">November</option><option value="DES">Desember</option>
            </select>

            <button class="btn-excel" onclick="exportToExcel()">Excel</button>
        </div>

        <div class="chart-container">
            <canvas id="trendChart"></canvas>
        </div>

        <div class="table-wrapper">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th width="30">#</th>
                        <th class="text-left">Unit Pelayanan / Periode</th>
                        <th>L</th>
                        <th>P</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
                <tfoot><tr id="tableFooter"></tr></tfoot>
            </table>
        </div>
    </div>
</div>

<script>
    let chartInstance = null;
    let monthlyData = {}; // Menyimpan data mentah 12 bulan
    const spreadsheetId = '1PogbrbJAnjpP7NqogqrQbu8WkKs1g62l';
    const daftarBulan = ['JAN', 'FEB', 'MAR', 'APR', 'MEI', 'JUN', 'JUL', 'AGS', 'SEP', 'OKT', 'NOV', 'DES'];

    async function init() {
        const status = document.getElementById('status');
        for (let b of daftarBulan) {
            status.innerText = `Sync ${b}...`;
            monthlyData[b] = await fetchCSV(b);
        }
        status.innerText = "Data Terupdate";
        processDisplay();
    }

    async function fetchCSV(sheetName) {
        const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;
        try {
            const response = await fetch(url);
            const csv = await response.text();
            const rows = csv.split('\n').map(r => r.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g)?.map(m => m.replace(/"/g, "")) || []);
            let data = [];
            for (let i = 12; i < rows.length; i++) {
                if (rows[i][1] && !rows[i][1].includes("TOTAL") && rows[i][1] !== "NAMA RUANGAN / POLI") {
                    data.push({ nama: rows[i][1].trim(), laki: parseInt(rows[i][2])||0, peremp: parseInt(rows[i][3])||0, total: parseInt(rows[i][4])||0 });
                }
            }
            return data;
        } catch { return []; }
    }

    function processDisplay() {
        const mode = document.getElementById('viewMode').value;
        const bulanAktif = document.getElementById('bulan').value;
        
        if (mode === "TREN_TOTAL") {
            renderTrendTahunan();
        } else {
            renderDetailBulan(bulanAktif);
        }
    }

    function renderTrendTahunan() {
        let labels = daftarBulan;
        let dataTotal = labels.map(b => monthlyData[b].reduce((sum, item) => sum + item.total, 0));
        let dataLaki = labels.map(b => monthlyData[b].reduce((sum, item) => sum + item.laki, 0));
        let dataPeremp = labels.map(b => monthlyData[b].reduce((sum, item) => sum + item.peremp, 0));

        updateChart('line', labels, [
            { label: 'Total Pasien', data: dataTotal, borderColor: '#007bff', fill: false },
            { label: 'Laki-laki', data: dataLaki, borderColor: '#3498db', borderDash: [5, 5], fill: false },
            { label: 'Perempuan', data: dataPeremp, borderColor: '#e74c3c', borderDash: [5, 5], fill: false }
        ]);

        let html = "";
        labels.forEach((b, i) => {
            html += `<tr><td>${i+1}</td><td class="text-left">Bulan ${b}</td><td>${dataLaki[i]}</td><td>${dataPeremp[i]}</td><td><strong>${dataTotal[i]}</strong></td></tr>`;
        });
        document.getElementById('tableBody').innerHTML = html;
        document.getElementById('tableFooter').innerHTML = `<td colspan="2">RATA-RATA BULANAN</td><td colspan="3">${Math.round(dataTotal.reduce((a,b)=>a+b)/12)} Pasien/Bulan</td>`;
    }

    function renderDetailBulan(bulan) {
        let data = (bulan === "TOTAL") ? agregasiTahunan() : monthlyData[bulan];
        data.sort((a,b) => b.total - a.total);
        let top10 = data.slice(0, 10);

        updateChart('bar', top10.map(d => d.nama), [
            { label: 'L', data: top10.map(d => d.laki), backgroundColor: '#3498db' },
            { label: 'P', data: top10.map(d => d.peremp), backgroundColor: '#e74c3c' }
        ]);

        let html = "";
        data.forEach((d, i) => {
            html += `<tr><td>${i+1}</td><td class="text-left">${d.nama}</td><td>${d.laki}</td><td>${d.peremp}</td><td><strong>${d.total}</strong></td></tr>`;
        });
        document.getElementById('tableBody').innerHTML = html;
    }

    function agregasiTahunan() {
        let res = {};
        daftarBulan.forEach(b => {
            monthlyData[b].forEach(d => {
                if(!res[d.nama]) res[d.nama] = { nama: d.nama, laki: 0, peremp: 0, total: 0 };
                res[d.nama].laki += d.laki; res[d.nama].peremp += d.peremp; res[d.nama].total += d.total;
            });
        });
        return Object.values(res);
    }

    function updateChart(type, labels, datasets) {
        const ctx = document.getElementById('trendChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: type,
            data: { labels: labels, datasets: datasets },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { boxWidth: 10 } } } }
        });
    }

    function exportToExcel() {
        XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("dataTable")), "Laporan_Puskesmas.xlsx");
    }

    init();
</script>
</body>
</html>
