<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puskesmas Cilincing - Dashboard 2026</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #2563eb; --pink: #ec4899; --green: #10b981; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        .header { background: #26ccca; color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .grid-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; border-left: 5px solid var(--primary); }
        .stat-card p { margin: 5px 0 0; font-size: 1.8rem; font-weight: 700; }
        #chart-container { position: relative; width: 100%; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        th { background: #f8fafc; font-size: 0.8rem; color: #64748b; text-transform: uppercase; }
        .loader { position: fixed; inset: 0; background: white; display: flex; justify-content: center; align-items: center; z-index: 100; flex-direction: column; }
    </style>
</head>
<body>

<div id="loader" class="loader">
    <div style="border: 4px solid #f3f3f3; border-top: 4px solid #2563eb; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
    <p>Menghubungkan ke Spreadsheet...</p>
</div>

<div class="container">
    <div class="header">
        <h1 style="margin:0; font-size: 1.5rem;">Puskesmas Kecamatan Cilincing</h1>
        <p style="margin:5px 0 0; opacity: 0.8;">Dashboard Rekapitulasi Kunjungan Pasien 2026</p>
    </div>

    <div class="card">
        <label><b>Pilih Bulan Data:</b></label>
        <select id="bulanSelect" onchange="loadAndRender()" style="padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin-left: 10px;">
            <option value="JAN">JANUARI</option>
            <option value="FEB">FEBRUARI</option>
            <option value="MAR">MARET</option>
        </select>
    </div>

    <div class="grid-stats">
        <div class="stat-card"><h3>LAKI-LAKI</h3><p id="totalL">0</p></div>
        <div class="stat-card" style="border-left-color: var(--pink);"><h3>PEREMPUAN</h3><p id="totalP">0</p></div>
        <div class="stat-card" style="border-left-color: var(--green);"><h3>TOTAL</h3><p id="totalT">0</p></div>
    </div>

    <div class="card">
        <h3>Grafik Perbandingan Seluruh Layanan (2026)</h3>
        <div id="chart-container">
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <div class="card">
        <h3>Tabel Rincian Layanan</h3>
        <table>
            <thead>
                <tr>
                    <th>Nama Ruangan / Poli</th>
                    <th>Laki-laki</th>
                    <th>Perempuan</th>
                    <th>Jumlah</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const SPREADSHEET_ID = '1PogbrbJAnjpP7NqogqrQbu8WkKs1g62l';
    let myChart = null;

    async function loadAndRender() {
        const loader = document.getElementById('loader');
        loader.style.display = 'flex';
        
        const bulan = document.getElementById('bulanSelect').value;
        // Menggunakan link export CSV dari Google Sheets
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${bulan}`;

        try {
            const response = await fetch(url);
            const csvText = await response.text();
            
            // PapaParse digunakan untuk menghandle nama yang mengandung koma/tanda kurung
            const results = Papa.parse(csvText, { header: false, skipEmptyLines: true });
            const allRows = results.data;

            // Kita mulai ambil data dari baris ke-14 (indeks 13) sesuai file Excel Anda
            // Baris ini biasanya berisi "LAYANAN UMUM"
            const dataRows = allRows.slice(13).filter(row => {
                return row[1] && row[1].trim() !== "" && !row[1].toUpperCase().includes("TOTAL");
            });

            processData(dataRows);
        } catch (err) {
            alert("Gagal memuat data. Pastikan Spreadsheet sudah disetel ke PUBLIC.");
            console.error(err);
        } finally {
            loader.style.display = 'none';
        }
    }

    function processData(rows) {
        let labels = [], lData = [], pData = [], tData = [];
        let grandL = 0, grandP = 0, grandT = 0;
        let tableHtml = "";

        rows.forEach(row => {
            const nama = row[1].trim().toUpperCase();
            // Berdasarkan file Anda untuk Tahun 2026:
            // Kolom L (index 11) = Laki-laki
            // Kolom M (index 12) = Perempuan
            // Kolom N (index 13) = Jumlah
            const l = parseInt(row[11]) || 0;
            const p = parseInt(row[12]) || 0;
            const t = parseInt(row[13]) || 0;

            if (t > 0 || nama === "LAYANAN UMUM" || nama === "LAYANAN GIGI") {
                labels.push(nama);
                lData.push(l);
                pData.push(p);
                tData.push(t);

                grandL += l; grandP += p; grandT += t;
                tableHtml += `<tr><td><b>${nama}</b></td><td>${l}</td><td>${p}</td><td><b>${t}</b></td></tr>`;
            }
        });

        document.getElementById('totalL').innerText = grandL.toLocaleString();
        document.getElementById('totalP').innerText = grandP.toLocaleString();
        document.getElementById('totalT').innerText = grandT.toLocaleString();
        document.getElementById('tableBody').innerHTML = tableHtml;

        renderChart(labels, lData, pData, tData);
    }

    function renderChart(labels, L, P, T) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (myChart) myChart.destroy();

        // Sesuaikan tinggi canvas agar semua poli (sekitar 27-30 poli) muat
        document.getElementById('chart-container').style.height = (labels.length * 35) + "px";

        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Laki-laki', data: L, backgroundColor: '#3b82f6' },
                    { label: 'Perempuan', data: P, backgroundColor: '#ec4899' },
                    { label: 'Total', data: T, backgroundColor: '#10b981' }
                ]
            },
            options: {
                indexAxis: 'y', // Bar horizontal agar nama poli terbaca jelas
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'top' }
                }
            }
        });
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    window.onload = loadAndRender;
</script>
</body>
</html>
