<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Puskesmas - Grafik & Tabel</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .container { background: white; max-width: 1200px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .controls { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; align-items: flex-end; }
        .control-group { text-align: left; }
        select { padding: 10px; border-radius: 8px; border: 1px solid #ddd; min-width: 180px; margin-top: 5px; cursor: pointer; }
        h2 { color: #2c3e50; margin-bottom: 10px; }
        .status-msg { font-size: 14px; color: #3498db; margin-bottom: 10px; height: 20px; font-weight: bold; }
        
        /* Styling Grafik */
        .chart-box { position: relative; height: 500px; margin-bottom: 40px; }

        /* Styling Tabel */
        .table-container { margin-top: 20px; overflow-x: auto; border-radius: 10px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 14px; }
        th { background-color: #2c3e50; color: white; padding: 12px; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f1f1f1; }
        .text-left { text-align: left; padding-left: 20px; }
        .bold { font-weight: bold; }
        .total-row { background-color: #ecf0f1 !important; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Analisis Kunjungan Pasien Puskesmas 2025</h2>
    <div id="loading" class="status-msg"></div>
    
    <div class="controls">
        <div class="control-group">
            <label>Pilih Periode Waktu:</label><br>
            <select id="bulan" onchange="loadData()">
                <option value="TOTAL">-- TOTAL SEMUA BULAN --</option>
                <option value="JAN">Januari</option>
                <option value="FEB">Februari</option>
                <option value="MAR">Maret</option>
                <option value="APR">April</option>
                <option value="MEI">Mei</option>
                <option value="JUN">Juni</option>
                <option value="JUL">Juli</option>
                <option value="AGS">Agustus</option>
                <option value="SEP">September</option>
                <option value="OKT">Oktober</option>
                <option value="NOV">November</option>
                <option value="DES">Desember</option>
            </select>
        </div>

        <div class="control-group">
            <label>Filter Nama Poli:</label><br>
            <select id="filterPoli" onchange="applyFilter()">
                <option value="SEMUA">-- Tampilkan Semua Poli --</option>
            </select>
        </div>
    </div>

    <div class="chart-box">
        <canvas id="myChart"></canvas>
    </div>

    <div class="table-container">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>No</th>
                    <th>Nama Ruangan / Poli</th>
                    <th>Laki-laki (L)</th>
                    <th>Perempuan (P)</th>
                    <th>Total (L+P)</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
            <tfoot>
                <tr id="tableFooter" class="total-row">
                    </tr>
            </tfoot>
        </table>
    </div>
</div>

<script>
    let chartInstance = null;
    let rawDataStore = [];
    const spreadsheetId = '1PogbrbJAnjpP7NqogqrQbu8WkKs1g62l';
    const daftarBulan = ['JAN', 'FEB', 'MAR', 'APR', 'MEI', 'JUN', 'JUL', 'AGS', 'SEP', 'OKT', 'NOV', 'DES'];

    async function loadData() {
        const selection = document.getElementById('bulan').value;
        const loader = document.getElementById('loading');
        rawDataStore = [];

        loader.innerHTML = "Sedang mengambil data...";

        if (selection === "TOTAL") {
            let agregasiPoli = {};
            for (let b of daftarBulan) {
                const dataBulan = await fetchCSV(b);
                dataBulan.forEach(item => {
                    if (!agregasiPoli[item.nama]) {
                        agregasiPoli[item.nama] = { laki: 0, peremp: 0, total: 0 };
                    }
                    agregasiPoli[item.nama].laki += item.laki;
                    agregasiPoli[item.nama].peremp += item.peremp;
                    agregasiPoli[item.nama].total += item.total;
                });
            }
            for (let poli in agregasiPoli) {
                rawDataStore.push({ 
                    nama: poli, 
                    laki: agregasiPoli[poli].laki, 
                    peremp: agregasiPoli[poli].peremp, 
                    total: agregasiPoli[poli].total 
                });
            }
            loader.innerHTML = "Berhasil menampilkan Total Tahunan.";
        } else {
            rawDataStore = await fetchCSV(selection);
            loader.innerHTML = `Data Bulan ${selection} Berhasil Dimuat.`;
        }

        updatePoliDropdown();
        applyFilter();
    }

    async function fetchCSV(sheetName) {
        const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;
        try {
            const response = await fetch(url);
            const csvText = await response.text();
            const rows = csvText.split('\n').map(row => {
                const matches = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                return matches ? matches.map(m => m.replace(/"/g, "")) : [];
            });

            let listData = [];
            for (let i = 12; i < rows.length; i++) {
                const row = rows[i];
                if (row && row[1]) {
                    const nama = row[1].trim();
                    const L = parseInt(row[2]) || 0;
                    const P = parseInt(row[3]) || 0;
                    const T = parseInt(row[4]) || 0;

                    if (nama !== "" && nama !== "NAMA RUANGAN / POLI" && !nama.includes("TOTAL")) {
                        listData.push({ nama, laki: L, peremp: P, total: T });
                    }
                }
            }
            return listData;
        } catch (e) {
            return [];
        }
    }

    function updatePoliDropdown() {
        const filterSelect = document.getElementById('filterPoli');
        const currentVal = filterSelect.value;
        let poliSet = new Set(rawDataStore.map(d => d.nama));
        filterSelect.innerHTML = '<option value="SEMUA">-- Tampilkan Semua Poli --</option>';
        Array.from(poliSet).sort().forEach(poli => {
            const opt = document.createElement('option');
            opt.value = poli; opt.innerHTML = poli;
            if (poli === currentVal) opt.selected = true;
            filterSelect.appendChild(opt);
        });
    }

    function applyFilter() {
        const filterValue = document.getElementById('filterPoli').value;
        let filteredData = [...rawDataStore];

        if (filterValue !== "SEMUA") {
            filteredData = rawDataStore.filter(d => d.nama === filterValue);
        }

        filteredData.sort((a, b) => b.total - a.total);

        renderChart(filteredData);
        renderTable(filteredData);
    }

    function renderChart(data) {
        const ctx = document.getElementById('myChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();

        const displayData = data.slice(0, 15); // Ambil 15 teratas untuk grafik agar tidak terlalu padat

        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: displayData.map(d => d.nama),
                datasets: [
                    { label: 'Laki-laki', data: displayData.map(d => d.laki), backgroundColor: '#3498db' },
                    { label: 'Perempuan', data: displayData.map(d => d.peremp), backgroundColor: '#e74c3c' }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                indexAxis: 'y',
                scales: { x: { stacked: true }, y: { stacked: true } }
            }
        });
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        const tfoot = document.getElementById('tableFooter');
        tbody.innerHTML = "";
        
        let grandL = 0, grandP = 0, grandT = 0;

        data.forEach((item, index) => {
            grandL += item.laki;
            grandP += item.peremp;
            grandT += item.total;

            const row = `<tr>
                <td>${index + 1}</td>
                <td class="text-left">${item.nama}</td>
                <td>${item.laki.toLocaleString()}</td>
                <td>${item.peremp.toLocaleString()}</td>
                <td class="bold">${item.total.toLocaleString()}</td>
            </tr>`;
            tbody.innerHTML += row;
        });

        // Update Footer Total
        tfoot.innerHTML = `
            <td colspan="2">TOTAL KESELURUHAN</td>
            <td>${grandL.toLocaleString()}</td>
            <td>${grandP.toLocaleString()}</td>
            <td>${grandT.toLocaleString()}</td>
        `;
    }

    loadData();
</script>
</body>
</html>
