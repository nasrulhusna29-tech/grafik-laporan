<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Puskesmas Cilincing 2026</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #2563eb; --accent: #26ccca; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 10px; border-left: 5px solid var(--primary); }
        .stat-card h3 { margin: 0; font-size: 0.8rem; color: #64748b; }
        .stat-card p { margin: 5px 0 0; font-size: 1.5rem; font-weight: 700; }
        #chart-wrapper { position: relative; width: 100%; min-height: 500px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 0.9rem; }
        th { background: #f8fafc; }
        .loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

<div id="loading" class="loader"><h3>Sedang Menyinkronkan Data...</h3></div>

<div class="container">
    <div class="card">
        <h2 style="margin-top:0;">Puskesmas Cilincing - Dashboard Data 2023-2026</h2>
        <div style="display:flex; gap:15px;">
            <div>
                <label>Pilih Tahun:</label><br>
                <select id="selTahun" onchange="updateDashboard()" style="padding:8px; border-radius:5px;">
                    <option value="2026">2026</option>
                    <option value="2025">2025</option>
                    <option value="2024">2024</option>
                    <option value="2023">2023</option>
                </select>
            </div>
            <div>
                <label>Pilih Bulan:</label><br>
                <select id="selBulan" onchange="updateDashboard()" style="padding:8px; border-radius:5px;">
                    <option value="JAN">Januari</option>
                    <option value="FEB">Februari</option>
                    <option value="MAR">Maret</option>
                </select>
            </div>
        </div>
    </div>

    <div class="grid">
        <div class="stat-card"><h3>TOTAL LAKI-LAKI</h3><p id="totalL">0</p></div>
        <div class="stat-card" style="border-left-color: #ec4899;"><h3>TOTAL PEREMPUAN</h3><p id="totalP">0</p></div>
        <div class="stat-card" style="border-left-color: #10b981;"><h3>TOTAL KUNJUNGAN</h3><p id="totalT">0</p></div>
    </div>

    <div class="card">
        <h3>Grafik Kunjungan Seluruh Layanan</h3>
        <div id="chart-wrapper">
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <div class="card">
        <h3>Tabel Detail Layanan</h3>
        <table id="dataTable">
            <thead>
                <tr>
                    <th>Nama Ruangan / Poli</th>
                    <th>Laki-Laki</th>
                    <th>Perempuan</th>
                    <th>Jumlah</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // GANTI ID INI DENGAN ID SPREADSHEET ANDA YANG BARU JIKA PERLU
    const SPREADSHEET_ID = '1PogbrbJAnjpP7NqogqrQbu8WkKs1g62l'; 
    let chartInstance = null;
    let rawData = {};

    async function loadData() {
        const bulanList = ['JAN', 'FEB', 'MAR']; // Tambahkan sesuai tab yang ada di sheet Anda
        try {
            for (let bulan of bulanList) {
                const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${bulan}`;
                const response = await fetch(url);
                const csvText = await response.text();
                const result = Papa.parse(csvText, { header: false });
                
                // Ambil data mulai baris 14 (Index 13)
                rawData[bulan] = result.data.slice(13).filter(row => row[1] && !row[1].includes('TOTAL'));
            }
            document.getElementById('loading').style.display = 'none';
            updateDashboard();
        } catch (error) {
            console.error("Gagal ambil data:", error);
            alert("Gagal memuat data. Pastikan link spreadsheet benar dan publik.");
        }
    }

    function updateDashboard() {
        const thn = document.getElementById('selTahun').value;
        const bln = document.getElementById('selBulan').value;
        const dataBulan = rawData[bln] || [];

        // Pemetaan Kolom Berdasarkan Tahun
        // 2023: col 2,3,4 | 2024: col 5,6,7 | 2025: col 8,9,10 | 2026: col 11,12,13
        const colMap = { "2023": 2, "2024": 5, "2025": 8, "2026": 11 };
        const startIdx = colMap[thn];

        let labels = [], dataL = [], dataP = [], dataT = [];
        let grandL = 0, grandP = 0, grandT = 0;
        let htmlTable = "";

        dataBulan.forEach(row => {
            const nama = row[1].trim().toUpperCase();
            const l = parseInt(row[startIdx]) || 0;
            const p = parseInt(row[startIdx+1]) || 0;
            const t = parseInt(row[startIdx+2]) || 0;

            if (t > 0) {
                labels.push(nama);
                dataL.push(l);
                dataP.push(p);
                dataT.push(t);

                grandL += l; grandP += p; grandT += t;

                htmlTable += `<tr><td>${nama}</td><td>${l}</td><td>${p}</td><td><b>${t}</b></td></tr>`;
            }
        });

        document.getElementById('totalL').innerText = grandL.toLocaleString();
        document.getElementById('totalP').innerText = grandP.toLocaleString();
        document.getElementById('totalT').innerText = grandT.toLocaleString();
        document.getElementById('tableBody').innerHTML = htmlTable;

        renderChart(labels, dataL, dataP, dataT);
    }

    function renderChart(labels, L, P, T) {
        const ctx = document.getElementById('myChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();

        // Mengatur tinggi canvas secara dinamis berdasarkan jumlah data
        const container = document.getElementById('chart-wrapper');
        container.style.height = (labels.length * 30) + "px";

        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Laki-Laki', data: L, backgroundColor: '#3b82f6' },
                    { label: 'Perempuan', data: P, backgroundColor: '#ec4899' },
                    { label: 'Total', data: T, backgroundColor: '#10b981' }
                ]
            },
            options: {
                indexAxis: 'y', // Membuat bar horizontal agar semua poli muncul
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: 'top' } }
            }
        });
    }

    window.onload = loadData;
</script>
</body>
</html>
