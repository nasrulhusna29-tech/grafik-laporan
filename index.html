<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Puskesmas Cilincing - Terintegrasi</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --primary: #007bff; --success: #28a745; --dark: #2c3e50; --bg: #f4f7f6; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 1.6rem; color: var(--dark); }
        
        /* Fitur Buttons */
        .action-btns { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; display: flex; align-items: center; gap: 5px; }
        .btn-print { background: #6c757d; }
        .btn-excel { background: var(--success); }
        .btn:hover { opacity: 0.8; }

        /* Filters */
        .filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #e9ecef; padding: 20px; border-radius: 10px; margin-bottom: 25px; }
        .filter-group label { display: block; font-weight: bold; font-size: 0.85rem; margin-bottom: 8px; }
        select { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 0.9rem; outline: none; }

        /* Charts */
        .chart-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart-container { height: 350px; background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 10px; }

        /* Table */
        .table-wrapper { max-height: 500px; overflow-y: auto; border: 1px solid #ddd; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: var(--dark); color: white; padding: 12px; position: sticky; top: 0; z-index: 5; text-transform: uppercase; font-size: 0.75rem; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        .text-left { text-align: left; padding-left: 20px; font-weight: bold; }
        tr:nth-child(even) { background: #fafafa; }
        tr:hover { background: #f1f7ff; }

        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; z-index: 9999; display: none; font-weight: bold; font-size: 1.2rem; }

        @media print {
            .filters, .action-btns, #loader { display: none !important; }
            .container { box-shadow: none; padding: 0; }
            .chart-section { grid-template-columns: 1fr; }
            .chart-container { height: 300px; page-break-inside: avoid; }
            .table-wrapper { overflow: visible; }
            table { font-size: 10pt; }
        }
    </style>
</head>
<body>

<div id="loader">⚙️ Mengolah Data Kolom Spreadsheet...</div>

<div class="container">
    <div class="header">
        <div>
            <h1>Dashboard Puskesmas Cilincing</h1>
            <small id="subtitle">Analisis Data Pasien 2023 - 2025</small>
        </div>
        <div class="action-btns">
            <button class="btn btn-excel" onclick="exportToExcel()">📊 Export Excel</button>
            <button class="btn btn-print" onclick="window.print()">🖨️ Cetak Laporan</button>
        </div>
    </div>

    <div class="filters">
        <div class="filter-group">
            <label>Pilih Tahun Data:</label>
            <select id="tahun" onchange="initLoad()">
                <option value="2025">Tahun 2025 (Kolom I-K)</option>
                <option value="2024">Tahun 2024 (Kolom F-H)</option>
                <option value="2023">Tahun 2023 (Kolom C-E)</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Pilih Bulan:</label>
            <select id="bulan" onchange="initLoad()">
                <option value="JAN">Januari</option><option value="FEB">Februari</option>
                <option value="MAR">Maret</option><option value="APR">April</option>
                <option value="MEI">Mei</option><option value="JUN">Juni</option>
                <option value="JUL">Juli</option><option value="AGS">Agustus</option>
                <option value="SEP">September</option><option value="OKT">Oktober</option>
                <option value="NOV">November</option><option value="DES">Desember</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Saring Nama Ruangan / Poli:</label>
            <select id="filterPoli" onchange="applyPoliFilter()">
                <option value="SEMUA">-- Tampilkan Semua Poli --</option>
            </select>
        </div>
    </div>

    <div class="chart-section">
        <div class="chart-container"><canvas id="barChart"></canvas></div>
        <div class="chart-container"><canvas id="lineChart"></canvas></div>
    </div>

    <div class="table-wrapper">
        <table id="mainTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th class="text-left">Unit Pelayanan (Poli)</th>
                    <th>Laki-laki (L)</th>
                    <th>Perempuan (P)</th>
                    <th>Total Pasien</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let barChart = null, lineChart = null;
    let fullYearData = {};
    const spreadsheetId = '1PogbrbJAnjpP7NqogqrQbu8WkKs1g62l';
    const listBulan = ['JAN', 'FEB', 'MAR', 'APR', 'MEI', 'JUN', 'JUL', 'AGS', 'SEP', 'OKT', 'NOV', 'DES'];

    async function initLoad() {
        const loader = document.getElementById('loader');
        loader.style.display = 'flex';
        
        const thn = document.getElementById('tahun').value;
        fullYearData = {};

        // Load 12 bulan untuk perbandingan tren
        for (let b of listBulan) {
            fullYearData[b] = await fetchCSV(b, thn);
        }

        updatePoliDropdown();
        applyPoliFilter();
        loader.style.display = 'none';
    }

    async function fetchCSV(sheetName, tahun) {
        const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;
        
        // Pemetaan Kolom Berdasarkan Input Anda
        let idxL, idxP, idxT;
        if (tahun === "2023") { idxL = 2; idxP = 3; idxT = 4; }
        else if (tahun === "2024") { idxL = 5; idxP = 6; idxT = 7; }
        else { idxL = 8; idxP = 9; idxT = 10; }

        try {
            const res = await fetch(url);
            const text = await res.text();
            // Parsing CSV dengan pengamanan koma di dalam teks (regex)
            const rows = text.split('\n').map(r => r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/).map(c => c.replace(/"/g, '')));
            
            let data = [];
            // Data dimulai baris 14 (index 13)
            for (let i = 13; i < rows.length; i++) {
                const r = rows[i];
                if (r && r[1] && !r[1].includes("TOTAL") && r[1] !== "NAMA RUANGAN / POLI") {
                    data.push({
                        nama: r[1].trim(),
                        laki: parseInt(r[idxL]) || 0,
                        peremp: parseInt(r[idxP]) || 0,
                        total: parseInt(r[idxT]) || 0
                    });
                }
            }
            return data;
        } catch (e) { return []; }
    }

    function updatePoliDropdown() {
        const poliSelect = document.getElementById('filterPoli');
        const selectedBulan = document.getElementById('bulan').value;
        const currentData = fullYearData[selectedBulan] || [];
        
        let daftarPoli = [...new Set(currentData.map(d => d.nama))].sort();
        const prevValue = poliSelect.value;
        
        poliSelect.innerHTML = '<option value="SEMUA">-- Tampilkan Semua Poli --</option>';
        daftarPoli.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p; opt.innerText = p;
            poliSelect.appendChild(opt);
        });
        if (daftarPoli.includes(prevValue)) poliSelect.value = prevValue;
    }

    function applyPoliFilter() {
        const poliTarget = document.getElementById('filterPoli').value;
        const selectedBulan = document.getElementById('bulan').value;
        const thn = document.getElementById('tahun').value;

        let tableData = fullYearData[selectedBulan] || [];
        if (poliTarget !== "SEMUA") {
            tableData = tableData.filter(d => d.nama === poliTarget);
        }

        // Hitung Tren 12 Bulan
        let lineValues = listBulan.map(b => {
            if (poliTarget === "SEMUA") return fullYearData[b].reduce((s, i) => s + i.total, 0);
            const found = fullYearData[b].find(d => d.nama === poliTarget);
            return found ? found.total : 0;
        });

        renderUI(tableData, lineValues, poliTarget, thn, selectedBulan);
    }

    function renderUI(tableData, lineData, poliName, thn, bln) {
        // Bar Chart
        const ctxBar = document.getElementById('barChart').getContext('2d');
        if (barChart) barChart.destroy();
        const topData = [...tableData].sort((a,b) => b.total - a.total).slice(0, 8);
        barChart = new Chart(ctxBar, {
            type: 'bar',
            data: {
                labels: topData.map(d => d.nama),
                datasets: [
                    { label: 'Laki-laki', data: topData.map(d => d.laki), backgroundColor: '#3498db' },
                    { label: 'Perempuan', data: topData.map(d => d.peremp), backgroundColor: '#e74c3c' }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // Line Chart
        const ctxLine = document.getElementById('lineChart').getContext('2d');
        if (lineChart) lineChart.destroy();
        lineChart = new Chart(ctxLine, {
            type: 'line',
            data: {
                labels: listBulan,
                datasets: [{
                    label: `Tren: ${poliName}`,
                    data: lineData,
                    borderColor: '#2ecc71',
                    fill: true,
                    backgroundColor: 'rgba(46, 204, 113, 0.1)',
                    tension: 0.3
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // Tabel
        document.getElementById('tableBody').innerHTML = tableData.map((d, i) => `
            <tr>
                <td>${i+1}</td>
                <td class="text-left">${d.nama}</td>
                <td>${d.laki.toLocaleString('id-ID')}</td>
                <td>${d.peremp.toLocaleString('id-ID')}</td>
                <td style="font-weight:bold; color:var(--primary)">${d.total.toLocaleString('id-ID')}</td>
            </tr>
        `).join('');
    }

    // Fungsi Export Excel
    function exportToExcel() {
        const thn = document.getElementById('tahun').value;
        const bln = document.getElementById('bulan').value;
        const poli = document.getElementById('filterPoli').value;
        
        const ws = XLSX.utils.table_to_sheet(document.getElementById('mainTable'));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Data Pasien");
        XLSX.writeFile(wb, `Laporan_Pasien_Cilincing_${bln}_${thn}_${poli}.xlsx`);
    }

    initLoad();
</script>
</body>
</html>
