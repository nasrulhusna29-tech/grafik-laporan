<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Analisis Tren Pasien - Puskesmas Cilincing</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #007bff; --dark: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); padding-bottom: 15px; margin-bottom: 25px; }
        .header h1 { margin: 0; font-size: 1.5rem; color: var(--dark); }

        .filters { display: flex; gap: 15px; background: #e9ecef; padding: 15px; border-radius: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .filter-group { flex: 1; min-width: 150px; }
        .filter-group label { display: block; font-weight: bold; font-size: 0.8rem; margin-bottom: 5px; }
        select { width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #ccc; }

        .chart-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart-container { height: 350px; background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 8px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        th { background: var(--dark); color: white; padding: 12px; cursor: pointer; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        .text-left { text-align: left; padding-left: 20px; font-weight: bold; }
        tr:hover { background: #f1f7ff; }

        #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255,255,255,0.9); padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.2); display: none; z-index: 100; }
    </style>
</head>
<body>

<div id="loader">🚀 Menghubungkan ke Spreadsheet...</div>

<div class="container">
    <div class="header">
        <div>
            <h1>Puskesmas Kecamatan Cilincing</h1>
            <small>Analisis Tren & Komposisi Pasien</small>
        </div>
        <div id="tahunDisplay" style="font-weight: bold; color: var(--primary);"></div>
    </div>

    <div class="filters">
        <div class="filter-group">
            <label>Tahun:</label>
            <select id="tahun" onchange="initLoad()">
                <option value="2025">2025</option>
                <option value="2024">2024</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Mode Visualisasi:</label>
            <select id="viewMode" onchange="renderCharts()">
                <option value="MONTHLY">Detail Per Unit (Bulan Terpilih)</option>
                <option value="ANNUAL">Tren Tahunan (Januari - Desember)</option>
            </select>
        </div>
        <div id="bulanFilterWrapper" class="filter-group">
            <label>Pilih Bulan:</label>
            <select id="bulan" onchange="initLoad()">
                <option value="JAN">Januari</option><option value="FEB">Februari</option>
                <option value="MAR">Maret</option><option value="APR">April</option>
                <option value="MEI">Mei</option><option value="JUN">Juni</option>
                <option value="JUL">Juli</option><option value="AGS">Agustus</option>
                <option value="SEP">September</option><option value="OKT">Oktober</option>
                <option value="NOV">November</option><option value="DES">Desember</option>
            </select>
        </div>
    </div>

    <div class="chart-section">
        <div class="chart-container">
            <canvas id="barChart"></canvas>
        </div>
        <div class="chart-container">
            <canvas id="lineChart"></canvas>
        </div>
    </div>

    <table id="dataTable">
        <thead>
            <tr>
                <th width="5%">#</th>
                <th class="text-left">Unit Pelayanan / Periode</th>
                <th width="15%">Laki-laki</th>
                <th width="15%">Perempuan</th>
                <th width="15%">Total</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    let barChart = null;
    let lineChart = null;
    let fullYearData = {}; // Menyimpan data 12 bulan
    
    const CONFIG_TAHUN = {
        "2025": "1PogbrbJAnjpP7NqogqrQbu8WkKs1g62l",
        "2024": "ID_SPREADSHEET_2024" 
    };
    const listBulan = ['JAN', 'FEB', 'MAR', 'APR', 'MEI', 'JUN', 'JUL', 'AGS', 'SEP', 'OKT', 'NOV', 'DES'];

    async function initLoad() {
        const loader = document.getElementById('loader');
        const mode = document.getElementById('viewMode').value;
        const thn = document.getElementById('tahun').value;
        const spreadsheetId = CONFIG_TAHUN[thn];

        loader.style.display = 'block';
        
        // Ambil data untuk line chart (selalu ambil 12 bulan untuk tren)
        for (let b of listBulan) {
            fullYearData[b] = await fetchCSV(spreadsheetId, b);
        }

        loader.style.display = 'none';
        renderCharts();
    }

    async function fetchCSV(id, sheet) {
        const url = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&sheet=${sheet}`;
        try {
            const response = await fetch(url);
            const text = await response.text();
            const rows = text.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '')));
            let data = [];
            for (let i = 12; i < rows.length; i++) {
                if (rows[i][1] && !rows[i][1].includes("TOTAL") && rows[i][1] !== "NAMA RUANGAN / POLI") {
                    data.push({
                        nama: rows[i][1].trim(),
                        laki: parseInt(rows[i][2]) || 0,
                        peremp: parseInt(rows[i][3]) || 0,
                        total: parseInt(rows[i][4]) || 0
                    });
                }
            }
            return data;
        } catch (e) { return []; }
    }

    function renderCharts() {
        const mode = document.getElementById('viewMode').value;
        const selectedBulan = document.getElementById('bulan').value;
        const thn = document.getElementById('tahun').value;
        
        // 1. Logic Tabel & Bar Chart (Berdasarkan Mode)
        let displayData = [];
        let labelsBar = [];
        let dataL = [], dataP = [];

        if (mode === "ANNUAL") {
            document.getElementById('bulanFilterWrapper').style.opacity = '0.3';
            listBulan.forEach(b => {
                const totalBulan = fullYearData[b].reduce((s, item) => s + item.total, 0);
                const totalL = fullYearData[b].reduce((s, item) => s + item.laki, 0);
                const totalP = fullYearData[b].reduce((s, item) => s + item.peremp, 0);
                displayData.push({ nama: "Bulan " + b, laki: totalL, peremp: totalP, total: totalBulan });
            });
        } else {
            document.getElementById('bulanFilterWrapper').style.opacity = '1';
            displayData = [...fullYearData[selectedBulan]].sort((a,b) => b.total - a.total);
        }

        // 2. Render Bar Chart
        const ctxBar = document.getElementById('barChart').getContext('2d');
        if (barChart) barChart.destroy();
        const topData = displayData.slice(0, 8);
        barChart = new Chart(ctxBar, {
            type: 'bar',
            data: {
                labels: topData.map(d => d.nama),
                datasets: [
                    { label: 'Laki-laki', data: topData.map(d => d.laki), backgroundColor: '#3498db' },
                    { label: 'Perempuan', data: topData.map(d => d.peremp), backgroundColor: '#e74c3c' }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: 'Komposisi Pasien (Top 8)' } } }
        });

        // 3. Render Line Chart (Tren Tahunan)
        const ctxLine = document.getElementById('lineChart').getContext('2d');
        if (lineChart) lineChart.destroy();
        const lineLabels = listBulan;
        const lineValues = listBulan.map(b => fullYearData[b].reduce((s, i) => s + i.total, 0));

        lineChart = new Chart(ctxLine, {
            type: 'line',
            data: {
                labels: lineLabels,
                datasets: [{
                    label: 'Total Kunjungan ' + thn,
                    data: lineValues,
                    borderColor: '#2ecc71',
                    backgroundColor: 'rgba(46, 204, 113, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: 'Tren Kunjungan Bulanan' } } }
        });

        // 4. Update Tabel
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = displayData.map((d, i) => `
            <tr>
                <td>${i+1}</td>
                <td class="text-left">${d.nama}</td>
                <td>${d.laki.toLocaleString()}</td>
                <td>${d.peremp.toLocaleString()}</td>
                <td style="font-weight:bold; color:var(--primary)">${d.total.toLocaleString()}</td>
            </tr>
        `).join('');
    }

    initLoad();
</script>
</body>
</html>
