<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Puskesmas Cilincing - Akumulasi Total</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --dark: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); padding-bottom: 15px; margin-bottom: 20px; }
        .action-btns { display: flex; gap: 10px; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
        .filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #e9ecef; padding: 20px; border-radius: 10px; margin-bottom: 25px; }
        .chart-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart-container { height: 350px; background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 10px; }
        .table-wrapper { max-height: 500px; overflow-y: auto; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: var(--dark); color: white; padding: 12px; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; }
    </style>
</head>
<body>

<div id="loader">
    <div style="font-size: 2rem;">⏳</div>
    <div id="loaderText">Menghitung Akumulasi Data...</div>
</div>

<div class="container">
    <div class="header">
        <h1>Dashboard Puskesmas Cilincing</h1>
        <div class="action-btns">
            <button class="btn" style="background:var(--success)" onclick="exportToExcel()">Excel</button>
            <button class="btn" style="background:#6c757d" onclick="window.print()">Cetak</button>
        </div>
    </div>

    <div class="filters">
        <div>
            <label>Tahun:</label>
            <select id="tahun" onchange="initLoad()">
                <option value="SEMUA">-- Seluruh Tahun (2023-2025) --</option>
                <option value="2025">Tahun 2025</option>
                <option value="2024">Tahun 2024</option>
                <option value="2023">Tahun 2023</option>
            </select>
        </div>
        <div>
            <label>Bulan:</label>
            <select id="bulan" onchange="initLoad()">
                <option value="SEMUA">-- Seluruh Bulan (Jan-Des) --</option>
                <option value="JAN">Januari</option><option value="FEB">Februari</option>
                <option value="MAR">Maret</option><option value="APR">April</option>
                <option value="MEI">Mei</option><option value="JUN">Juni</option>
                <option value="JUL">Juli</option><option value="AGS">Agustus</option>
                <option value="SEP">September</option><option value="OKT">Oktober</option>
                <option value="NOV">November</option><option value="DES">Desember</option>
            </select>
        </div>
        <div>
            <label>Ruangan/Poli:</label>
            <select id="filterPoli" onchange="applyFilters()">
                <option value="SEMUA">-- Semua Poli --</option>
            </select>
        </div>
    </div>

    <div class="chart-section">
        <div class="chart-container"><canvas id="barChart"></canvas></div>
        <div class="chart-container"><canvas id="lineChart"></canvas></div>
    </div>

    <div class="table-wrapper">
        <table id="mainTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th style="text-align:left; padding-left:20px;">Unit Pelayanan</th>
                    <th>Laki-laki</th>
                    <th>Perempuan</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let barChart = null, lineChart = null;
    let cachedData = {}; // Struktur: { JAN: { "Poli A": {2023: {}, 2024: {}, 2025: {}}, ... } }
    const spreadsheetId = '1PogbrbJAnjpP7NqogqrQbu8WkKs1g62l';
    const listBulan = ['JAN', 'FEB', 'MAR', 'APR', 'MEI', 'JUN', 'JUL', 'AGS', 'SEP', 'OKT', 'NOV', 'DES'];
    const listTahun = ['2023', '2024', '2025'];

    async function initLoad() {
        const loader = document.getElementById('loader');
        loader.style.display = 'flex';
        
        // Load SEMUA data ke memori (hanya sekali jika belum ada)
        for (let b of listBulan) {
            if (!cachedData[b]) {
                document.getElementById('loaderText').innerText = `Mengambil Data Bulan ${b}...`;
                cachedData[b] = await fetchAllTahunFromSheet(b);
            }
        }

        updatePoliDropdown();
        applyFilters();
        loader.style.display = 'none';
    }

    async function fetchAllTahunFromSheet(sheetName) {
        const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;
        try {
            const res = await fetch(url);
            const text = await res.text();
            const rows = text.split('\n').map(r => r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/).map(c => c.replace(/"/g, '')));
            
            let dataMapping = {};
            for (let i = 13; i < rows.length; i++) {
                const r = rows[i];
                if (r && r[1] && !r[1].includes("TOTAL") && r[1] !== "NAMA RUANGAN / POLI") {
                    const poli = r[1].trim();
                    dataMapping[poli] = {
                        "2023": { l: parseInt(r[2])||0, p: parseInt(r[3])||0, t: parseInt(r[4])||0 },
                        "2024": { l: parseInt(r[5])||0, p: parseInt(r[6])||0, t: parseInt(r[7])||0 },
                        "2025": { l: parseInt(r[8])||0, p: parseInt(r[9])||0, t: parseInt(r[10])||0 }
                    };
                }
            }
            return dataMapping;
        } catch (e) { return {}; }
    }

    function updatePoliDropdown() {
        const poliSelect = document.getElementById('filterPoli');
        let allPoli = new Set();
        Object.values(cachedData).forEach(bulan => Object.keys(bulan).forEach(p => allPoli.add(p)));
        
        const current = poliSelect.value;
        poliSelect.innerHTML = '<option value="SEMUA">-- Semua Poli --</option>';
        [...allPoli].sort().forEach(p => {
            const opt = document.createElement('option');
            opt.value = p; opt.innerText = p;
            poliSelect.appendChild(opt);
        });
        poliSelect.value = current || "SEMUA";
    }

    function applyFilters() {
        const selThn = document.getElementById('tahun').value;
        const selBln = document.getElementById('bulan').value;
        const selPoli = document.getElementById('filterPoli').value;

        // 1. Proses Data untuk Tabel & Bar Chart
        let tableData = [];
        let poliList = (selPoli === "SEMUA") ? Object.keys(cachedData['JAN']) : [selPoli];

        poliList.forEach(namaPoli => {
            let sumL = 0, sumP = 0, sumT = 0;
            
            const targetBulan = (selBln === "SEMUA") ? listBulan : [selBln];
            const targetTahun = (selThn === "SEMUA") ? listTahun : [selThn];

            targetBulan.forEach(b => {
                targetTahun.forEach(t => {
                    if (cachedData[b] && cachedData[b][namaPoli]) {
                        sumL += cachedData[b][namaPoli][t].l;
                        sumP += cachedData[b][namaPoli][t].p;
                        sumT += cachedData[b][namaPoli][t].t;
                    }
                });
            });

            if (sumT > 0) tableData.push({ nama: namaPoli, laki: sumL, peremp: sumP, total: sumT });
        });

        // 2. Proses Data Tren (Line Chart)
        let lineValues = listBulan.map(b => {
            let val = 0;
            const targetTahun = (selThn === "SEMUA") ? listTahun : [selThn];
            const activePoli = (selPoli === "SEMUA") ? Object.keys(cachedData[b] || {}) : [selPoli];
            
            activePoli.forEach(p => {
                targetTahun.forEach(t => {
                    if (cachedData[b] && cachedData[b][p]) val += cachedData[b][p][t].t;
                });
            });
            return val;
        });

        renderUI(tableData, lineValues, selPoli, selThn, selBln);
    }

    function renderUI(tableData, lineData, pName, thn, bln) {
        // Update Table
        document.getElementById('tableBody').innerHTML = tableData.sort((a,b)=>b.total-a.total).map((d, i) => `
            <tr>
                <td>${i+1}</td>
                <td style="text-align:left; padding-left:20px; font-weight:bold;">${d.nama}</td>
                <td>${d.laki.toLocaleString()}</td>
                <td>${d.peremp.toLocaleString()}</td>
                <td style="font-weight:bold; color:var(--primary)">${d.total.toLocaleString()}</td>
            </tr>
        `).join('');

        // Bar Chart
        const ctxBar = document.getElementById('barChart').getContext('2d');
        if (barChart) barChart.destroy();
        const top = tableData.slice(0, 8);
        barChart = new Chart(ctxBar, {
            type: 'bar',
            data: {
                labels: top.map(d=>d.nama),
                datasets: [
                    { label: 'L', data: top.map(d=>d.laki), backgroundColor: '#3498db' },
                    { label: 'P', data: top.map(d=>d.peremp), backgroundColor: '#e74c3c' }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display:true, text: `Komposisi Pasien (${bln} ${thn})` } } }
        });

        // Line Chart
        const ctxLine = document.getElementById('lineChart').getContext('2d');
        if (lineChart) lineChart.destroy();
        lineChart = new Chart(ctxLine, {
            type: 'line',
            data: {
                labels: listBulan,
                datasets: [{
                    label: `Tren Kunjungan ${pName}`,
                    data: lineData,
                    borderColor: '#2ecc71',
                    tension: 0.3,
                    fill: true,
                    backgroundColor: 'rgba(46, 204, 113, 0.1)'
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    function exportToExcel() {
        const ws = XLSX.utils.table_to_sheet(document.getElementById('mainTable'));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Rekap Pasien");
        XLSX.writeFile(wb, `Laporan_Puskesmas_Cilincing.xlsx`);
    }

    initLoad();
</script>
</body>
</html>
