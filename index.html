<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Kunjungan Puskesmas - Berdasarkan Tahun & Bulan</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 3px solid var(--accent); margin-bottom: 20px; padding-bottom: 10px; }
        .filters { display: flex; gap: 15px; background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; align-items: center; justify-content: center; }
        select, button { padding: 8px 15px; border-radius: 5px; border: 1px solid #ddd; font-size: 14px; }
        .btn-update { background: var(--accent); color: white; border: none; cursor: pointer; font-weight: bold; }
        .chart-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 30px; height: 350px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th { background: var(--primary); color: white; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        .text-left { text-align: left; }
        .summary-box { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .card { background: #eef7ff; padding: 15px; border-radius: 8px; text-align: center; flex: 1; margin: 0 10px; border-left: 5px solid var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Dashboard Tren Kunjungan Pasien</h2>
        <p>Puskesmas Kecamatan Cilincing</p>
    </div>

    <div class="filters">
        <label><strong>Tahun:</strong></label>
        <select id="tahun">
            <option value="2025">2025</option>
            <option value="2024">2024</option>
        </select>

        <label><strong>Bulan:</strong></label>
        <select id="bulan">
            <option value="JAN">Januari</option>
            <option value="FEB">Februari</option>
            <option value="MAR">Maret</option>
            <option value="APR">April</option>
            <option value="MEI">Mei</option>
            <option value="JUNI">Juni</option>
            <option value="JULI">Juli</option>
            <option value="AGS">Agustus</option>
            <option value="SEP">September</option>
            <option value="OKT">Oktober</option>
            <option value="NOV">November</option>
            <option value="DES">Desember</option>
        </select>
        
        <button class="btn-update" onclick="loadData()">Tampilkan Data</button>
    </div>

    <div class="summary-box">
        <div class="card">
            <small>Total Kunjungan</small>
            <h3 id="statTotal">0</h3>
        </div>
        <div class="card">
            <small>Layanan Tertinggi</small>
            <h3 id="statTop"> - </h3>
        </div>
    </div>

    <div class="chart-grid">
        <canvas id="mainChart"></canvas>
    </div>

    <div style="overflow-x:auto;">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>No</th>
                    <th class="text-left">Nama Layanan / Poli</th>
                    <th>Bayar</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let myChart = null;
    // Ganti ID ini sesuai dengan Spreadsheet 2025 Anda
    const spreadsheetId = '1PogbrbJAnjpP7NqogqrQbu8WkKs1g62l'; 

    async function loadData() {
        const bln = document.getElementById('bulan').value;
        const thn = document.getElementById('tahun').value;
        const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:csv&sheet=${bln}`;

        try {
            const response = await fetch(url);
            const csvText = await response.text();
            const rows = csvText.split('\n').map(row => row.split(',').map(cell => cell.replace(/"/g, '')));
            
            // Logika parsing disesuaikan dengan range data (baris 3 ke bawah berdasarkan sample)
            let parsedData = [];
            for (let i = 2; i < rows.length; i++) {
                if (rows[i][2] && rows[i][2] !== "" && rows[i][14]) {
                    parsedData.push({
                        layanan: rows[i][2],
                        bayar: parseInt(rows[i][3]) || 0,
                        total: parseInt(rows[i][14]) || 0
                    });
                }
            }

            updateUI(parsedData, bln, thn);
        } catch (error) {
            alert("Gagal memuat data. Pastikan nama sheet sesuai.");
        }
    }

    function updateUI(data, bln, thn) {
        // Filter data yang ada isinya saja
        const filtered = data.filter(d => d.total > 0).sort((a,b) => b.total - a.total);
        
        // Update Statistik
        const totalAll = filtered.reduce((a, b) => a + b.total, 0);
        document.getElementById('statTotal').innerText = totalAll.toLocaleString('id-ID');
        document.getElementById('statTop').innerText = filtered.length > 0 ? filtered[0].layanan : "-";

        // Update Tabel
        let html = "";
        filtered.forEach((d, i) => {
            html += `<tr><td>${i+1}</td><td class="text-left">${d.layanan}</td><td>${d.bayar}</td><td><strong>${d.total}</strong></td></tr>`;
        });
        document.getElementById('tableBody').innerHTML = html;

        // Update Chart
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (myChart) myChart.destroy();
        
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: filtered.slice(0, 10).map(d => d.layanan),
                datasets: [{
                    label: `Total Kunjungan ${bln} ${thn}`,
                    data: filtered.slice(0, 10).map(d => d.total),
                    backgroundColor: '#3498db',
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } }
            }
        });
    }

    // Load data otomatis saat pertama buka
    window.onload = loadData;
</script>
</body>
</html>
